<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RULET KAHİNİ | PREMIUM ANALİZ</title>
    <style>
        :root {
            --accent-purple: #9d00ff;
            --accent-red: #ff004c;
            --gold: #ffd700;
        }
        
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050005 100%);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- GİRİŞ EKRANI --- */
        #login { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        /* LOGO SORUNUNU ÇÖZEN KISIM: İnternet linki yerine yüklediğin dosyayı çeker */
        .login-logo { width: 130px; filter: drop-shadow(0 0 15px var(--accent-purple)); margin-bottom: 20px; }
        .login-title { color: var(--gold); font-size: 30px; margin-bottom: 25px; text-shadow: 0 0 15px var(--accent-red); font-weight: 900; }
        input { 
            padding: 18px; width: 280px; background: #111; border: 2px solid var(--accent-purple); 
            color: var(--gold); border-radius: 15px; margin-bottom: 25px; text-align: center; font-size: 18px; outline: none;
        }
        .l-btn { 
            padding: 15px 80px; background: linear-gradient(45deg, var(--accent-purple), var(--accent-red)); 
            border: none; border-radius: 15px; font-weight: bold; font-size: 18px; color: white; cursor: pointer;
            box-shadow: 0 5px 20px rgba(157, 0, 255, 0.5);
        }

        /* --- ANA ARAYÜZ --- */
        .top-bar {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; box-sizing: border-box; background: rgba(0,0,0,0.8);
            border-bottom: 2px solid var(--accent-purple);
        }
        .logo-img { height: 50px; border-radius: 50%; border: 1.5px solid var(--accent-red); box-shadow: 0 0 12px var(--accent-red); }
        .brand-name { font-weight: 900; color: var(--gold); font-size: 20px; letter-spacing: 1px; }

        .card {
            width: 90%; max-width: 420px;
            background: linear-gradient(135deg, rgba(60, 0, 90, 0.7), rgba(10, 0, 10, 0.95));
            border: 2.5px solid var(--accent-red); border-radius: 25px; padding: 25px; margin: 25px 0;
            box-shadow: 0 0 30px rgba(255, 0, 76, 0.3); text-align: center;
            backdrop-filter: blur(10px);
        }
        .res-row { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 15px 0; }
        .num-val { font-size: 50px; font-weight: 900; border: 3px solid var(--gold); padding: 5px 25px; border-radius: 15px; background: #000; }
        .pred-val { font-size: 55px; font-weight: 900; color: #00ff9d; text-shadow: 0 0 20px #00ff9d; }
        .warn { color: var(--gold); font-weight: bold; font-size: 15px; animation: blink 1.5s infinite; text-transform: uppercase; }
        @keyframes blink { 50% { opacity: 0.2; } }

        .table-box {
            background: #064e3b; padding: 15px; border-radius: 15px; border: 6px solid #4a3623;
            width: 95%; max-width: 450px; box-shadow: 0 15px 40px #000;
        }
        .grid { display: grid; grid-template-columns: 55px repeat(12, 1fr); grid-template-rows: repeat(3, 50px); gap: 5px; }
        .btn { display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; color: white; border-radius: 6px; cursor: pointer; border-bottom: 3px solid rgba(0,0,0,0.5); }
        .zero { background: #15803d; grid-row: 1/4; border: 2.5px solid white; }
        .red { background: #dc2626; }
        .black { background: #1a1a1a; }
    </style>
</head>
<body>

    <div id="login">
        <img src="logo.png" class="login-logo">
        <div class="login-title">RULET KAHİNİ</div>
        <input type="text" id="keyInput" placeholder="LİSANS ANAHTARI">
        <button class="l-btn" onclick="verify()">GİRİŞ YAP</button>
    </div>

    <div class="top-bar">
        <img src="logo.png" class="logo-img">
        <div class="brand-name">RULET KAHİNİ</div>
    </div>

    <div class="card">
        <div style="font-size:12px; color:var(--accent-purple); letter-spacing:4px; font-weight:bold;">KAHİN ALGORİTMASI</div>
        <div class="res-row">
            <div id="sel" class="num-val">?</div>
            <div style="color:var(--gold); font-size:35px;">➤</div>
            <div id="pre" class="pred-val">--</div>
        </div>
        <div class="warn">⚠️ 4'LÜ VEYA 5'Lİ KOMŞU ALINIZ ⚠️</div>
    </div>

    <div class="table-box">
        <div class="grid" id="g">
            <div class="btn zero" onclick="calc(0)">0</div>
        </div>
    </div>

        const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
        const rows = [[3,6,9,12,15,18,21,24,27,30,33,36],[2,5,8,11,14,17,20,23,26,29,32,35],[1,4,7,10,13,16,19,22,25,28,31,34]];

        const g = document.getElementById('g');
        rows.forEach((row, rIdx) => {
            row.forEach(n => {
                const b = document.createElement('div');
                b.className = `btn ${reds.includes(n) ? 'red' : 'black'}`;
                b.innerText = n;
                b.style.gridRow = rIdx + 1;
                b.onclick = () => calc(n);
                g.appendChild(b);
            });
        });

        function verify() {
            const val = document.getElementById('keyInput').value.trim().toUpperCase();
            if(validKeys.includes(val)) {
                document.getElementById('login').style.display = 'none';
            } else {
                alert("LİSANS ANAHTARI GEÇERSİZ!");
            }
        }

        function calc(n) {
            document.getElementById('sel').innerText = n;
            document.getElementById('pre').innerText = data[n];
        }
    </script>
</body>
</html>
